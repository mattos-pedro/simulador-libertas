  const downsideDev = Math.sqrt(downsideDeviations.reduce((s,v)=>s+v**2,0)/n)*Math.sqrt(12);
  const sortino = downsideDev>0 ? (ar - ac)/downsideDev : 0;

  // Pain Index & Pain Ratio
  let painPeak=1,painSumDD=0;
  cd.forEach(c2=>{if(c2.cum>painPeak)painPeak=c2.cum;painSumDD+=Math.abs((c2.cum-painPeak)/painPeak);});
  const painIndex=painSumDD/n;
  const painRatio=painIndex>0?(ar-ac)/painIndex:0;
  const means={};keys.forEach(k=>means[k]=data.reduce((s,r)=>s+(r[k]||0),0)/n);
  const cov={};keys.forEach(ki=>{cov[ki]={};keys.forEach(kj=>{
    cov[ki][kj]=n>1?data.reduce((s,r)=>s+((r[ki]||0)-means[ki])*((r[kj]||0)-means[kj]),0)/(n-1):0;});});
  const ctr={},ctrP={};keys.forEach(ki=>{let sc=0;keys.forEach(kj=>sc+=w[kj]*cov[ki][kj]);ctr[ki]=mv>0?w[ki]*sc/mv:0;});
  const tC=keys.reduce((s,k)=>s+ctr[k],0);keys.forEach(k=>ctrP[k]=tC!==0?ctr[k]/tC:0);

  const forwardFactors = new Array(n).fill(1);
  let link = 1;
  for(let i=n-1;i>=0;i--){forwardFactors[i]=link;link*=(1+pr[i].r);}
  const rc={};
  keys.forEach(k=>{rc[k]=0;});
  data.forEach((row,i)=>{keys.forEach(k=>{rc[k]+=w[k]*(row[k]||0)*forwardFactors[i];});});

  return{cumData:cd,portRets:pr,totalReturn:tr,annReturn:ar,annVol:av,maxDD:mdd,
    bestMonth:sorted[n-1],worstMonth:sorted[0],sharpe,infoRatio:info,trackingError:tracking,sortino,painIndex,painRatio,
    ctr,ctrPct:ctrP,weights:w,annBench:ab,annCDI:ac,annReal:arr,keys,retContrib:rc,nMonths:n};
}

function calcCorr(data){
  const n=data.length;const dk=AK.filter(k=>!['cdi','ipca'].includes(k));
  const m={};dk.forEach(k=>m[k]=data.reduce((s,r)=>s+(r[k]||0),0)/n);
  const st={};dk.forEach(k=>st[k]=Math.sqrt(data.reduce((s,r)=>s+((r[k]||0)-m[k])**2,0)/(n-1)));
  const co={};dk.forEach(ki=>{co[ki]={};dk.forEach(kj=>{
    const cv=data.reduce((s,r)=>s+((r[ki]||0)-m[ki])*((r[kj]||0)-m[kj]),0)/(n-1);
    co[ki][kj]=st[ki]>0&&st[kj]>0?cv/(st[ki]*st[kj]):0;});});return{corr:co,keys:dk};}

function calcFront(data){
  const n=data.length;const fk=AK.filter(k=>!['cdi','ipca'].includes(k));
  const m={};fk.forEach(k=>m[k]=data.reduce((s,r)=>s+(r[k]||0),0)/n);
  const cv={};fk.forEach(ki=>{cv[ki]={};fk.forEach(kj=>{
    cv[ki][kj]=n>1?data.reduce((s,r)=>s+((r[ki]||0)-m[ki])*((r[kj]||0)-m[kj]),0)/(n-1):0;});});
  const pts=[];const cm=data.reduce((s,r)=>s+(r.cdi||0),0)/n;
  for(let i=0;i<2500;i++){const rw={};let sum=0;fk.forEach(k=>{rw[k]=Math.random()**2;sum+=rw[k];});
    fk.forEach(k=>rw[k]/=sum);let pR=0;fk.forEach(k=>pR+=rw[k]*m[k]);
    let pV=0;fk.forEach(ki=>fk.forEach(kj=>pV+=rw[ki]*rw[kj]*cv[ki][kj]));
    if(pV<=0)continue;const vol=Math.sqrt(pV)*Math.sqrt(12);const ann=Math.pow(1+pR,12)-1;
    const sharpe=vol>0?((pR-cm)/Math.sqrt(pV))*Math.sqrt(12):0;
    pts.push({vol:+(vol*100).toFixed(2),ret:+(ann*100).toFixed(2),sharpe:+sharpe.toFixed(3)});}return pts;}

function projectReturns(sc) {
  const s = sc.selic/100, ip = sc.ipca/100, cx = sc.cambio/100;
  const ru = sc.retUSA/100, yu = sc.yieldUSA/100;
  const sp = sc.spreadCred/100, erp2 = sc.erp/100, am = sc.alphaMM/100;
  const jrc = sc.juroRealCurto/100, jrl = sc.juroRealLongo/100;
  
  const proj = {};
  // RF Pós
  proj.imas = s;
  proj.cdi = s;
  proj.idadi = s + sp;
  // RF Pré
  proj.irfm1 = s + 0.002;
  proj.irfm = s + 0.005;
  proj.irfm1p = s + 0.01;
  proj.imagexc = s + 0.003;
  // Inflação
  proj.imab5 = (1+ip)*(1+jrc)-1;
  proj.imab = (1+ip)*(1+(jrc+jrl)/2)-1;
  proj.imab5p = (1+ip)*(1+jrl)-1;
  proj.idaipca = (1+ip)*(1+jrl+sp)-1;
  // RV Brasil
  proj.ibov = s + erp2;
  proj.ibx = s + erp2 - 0.005;
  proj.idiv = s + erp2 + 0.01;
  // Exterior em BRL
  proj.sp500 = (1+ru)*(1+cx)-1;
  proj.acwi = (1+ru*0.9)*(1+cx)-1;
  proj.msciw = (1+ru*0.95)*(1+cx)-1;
  proj.barclays = (1+yu)*(1+cx)-1;
  proj.iboxx = (1+yu+0.01)*(1+cx)-1;
  // Alternativos
  proj.ifmm = s + am;
  proj.hfri = (1+0.06)*(1+cx)-1;
  // IPCA e CDI refs
  proj.ipca = ip;
  
  return proj;
}

function projectPortfolio(weights, scenario, historicalData) {
  const proj = projectReturns(scenario);
  const ak = Object.keys(weights).filter(k => (weights[k]||0) > 0);
  const tw = ak.reduce((s,k) => s + (weights[k]||0), 0);
  if (tw < 1) return null;
  
  const w = {};
  ak.forEach(k => w[k] = (weights[k]||0) / tw);
  
  // Expected annual return
  let expRet = 0;
  ak.forEach(k => expRet += w[k] * (proj[k] || 0));
  
  // Use historical vol (can't project vol from Focus easily)
  const n = historicalData.length;
  const means = {};
  ak.forEach(k => means[k] = historicalData.reduce((s,r) => s + (r[k]||0), 0) / n);
  let pVar = 0;
  const cov = {};
  ak.forEach(ki => {
    cov[ki] = {};
    ak.forEach(kj => {
      cov[ki][kj] = historicalData.reduce((s,r) => s + ((r[ki]||0)-means[ki])*((r[kj]||0)-means[kj]), 0)/(n-1);
    });
  });
  ak.forEach(ki => ak.forEach(kj => pVar += w[ki]*w[kj]*cov[ki][kj]));
  const annVol = Math.sqrt(Math.max(pVar,0)) * Math.sqrt(12);
  
  // Benchmark
  const benchRet = (1 + proj.ipca) * (1 + 0.0409) - 1;
  
  // Project cumulative over horizon
  const hz = scenario.horizonte;
  const cumPort = Math.pow(1 + expRet, hz);
  const cumBench = Math.pow(1 + benchRet, hz);
  const cumCDI = Math.pow(1 + proj.cdi, hz);
  
  // Stress scenario: +2pp IPCA, +3pp Selic, RV -30% year 1 then recovers
  let stressRet = expRet;
  if (scenario.stress) {
    const stressProj = projectReturns({
      ...scenario,
      ipca: scenario.ipca + 2,
      selic: scenario.selic + 3,
      cambio: scenario.cambio + 10,
      retUSA: scenario.retUSA - 5,
      erp: scenario.erp - 3,
    });
    stressRet = 0;
    ak.forEach(k => stressRet += w[k] * (stressProj[k] || 0));
  }
  
  // Per-asset contribution to expected return
  const contrib = {};
  ak.forEach(k => contrib[k] = { weight: w[k], expRet: proj[k]||0, contribution: w[k]*(proj[k]||0) });
  
  // Year-by-year projection
  const yearly = [];
  for (let y = 1; y <= hz; y++) {
    yearly.push({
      year: y,
      port: Math.pow(1+expRet, y) * 100,
      bench: Math.pow(1+benchRet, y) * 100,
      cdi: Math.pow(1+proj.cdi, y) * 100,
      stress: Math.pow(1+stressRet, y) * 100,
    });
  }
  
  return {
    expRet, annVol, benchRet, stressRet,
    cumPort, cumBench, cumCDI,
    contrib, yearly, proj,
    realRet: (1+expRet)/(1+proj.ipca)-1,
    excessVsBench: expRet - benchRet,
  };
}

function mulberry32(seed){let a=seed>>>0;return function(){a|=0;a=(a+0x6D2B79F5)|0;let t=Math.imul(a^(a>>>15),1|a);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;};}

function runOpt(data,ak,mins,maxs,segMax,nSim=40000,seed=42){const n=data.length;if(n<6)return null;const means={};ak.forEach(k=>means[k]=data.reduce((s,r)=>s+(r[k]||0),0)/n);const cov={};ak.forEach(ki=>{cov[ki]={};ak.forEach(kj=>{cov[ki][kj]=data.reduce((s,r)=>s+((r[ki]||0)-means[ki])*((r[kj]||0)-means[kj]),0)/(n-1);});});const cdiM=data.reduce((s,r)=>s+(r.cdi||0),0)/n;const res=[];const rng=mulberry32(seed||42);for(let i=0;i<nSim;i++){const w=genC(ak,mins,maxs,segMax,rng);if(!w)continue;let pR=0;ak.forEach(k=>pR+=(w[k]/100)*means[k]);let pV=0;ak.forEach(ki=>ak.forEach(kj=>pV+=(w[ki]/100)*(w[kj]/100)*cov[ki][kj]));if(pV<=0)continue;const vol=Math.sqrt(pV)*Math.sqrt(12);const ann=Math.pow(1+pR,12)-1;const sh=(pR-cdiM)/Math.sqrt(pV)*Math.sqrt(12);const pRets=data.map(row=>{let r=0;ak.forEach(k=>r+=(w[k]/100)*(row[k]||0));return r;});let cum=1,pk=1,sDD=0;pRets.forEach(r=>{cum*=(1+r);if(cum>pk)pk=cum;sDD+=Math.abs((cum-pk)/pk);});const pi=sDD/n;res.push({w:{...w},vol,ret:ann,sharpe:sh,painIndex:pi,painRatio:pi>0?(ann-(Math.pow(1+cdiM,12)-1))/pi:0});}if(!res.length)return null;const maxSh=res.reduce((b,r)=>r.sharpe>b.sharpe?r:b,res[0]);const minV=res.reduce((b,r)=>r.vol<b.vol?r:b,res[0]);const tgts=[.01,.03,.05];const tP=tgts.map(t=>{let cd2=res.filter(r=>Math.abs(r.vol-t)<.005);if(!cd2.length)cd2=res.filter(r=>Math.abs(r.vol-t)<.02);if(!cd2.length)return null;return cd2.reduce((b,r)=>r.sharpe>b.sharpe?r:b,cd2[0]);});return{all:res,maxSharpe:maxSh,minVol:minV,targetPorts:tP,targets:tgts,count:res.length,seed};}

  return out;
}

function triggerDownload(filename, content, type='application/json;charset=utf-8'){
  const blob=new Blob([content],{type});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=filename;document.body.appendChild(a);a.click();a.remove();
  URL.revokeObjectURL(url);
}

function csvEscape(v){const s=String(v??'');return /[",;
]/.test(s)?`"${s.replace(/"/g,'""')}"`:s;}

            </label>
          </div>
          
          <button onClick={runProj} style={{width:"100%",padding:"10px 0",borderRadius:8,border:"none",fontSize:12,fontWeight:700,cursor:"pointer",background:`linear-gradient(135deg,${C.pri},${C.sec})`,color:C.white,marginBottom:14}}>
            📊 Projetar Carteira
          </button>
          
          {projResult&&(<div>
            {/* Summary Cards */}
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
              <Card label="Ret. Esperado" value={(projResult.expRet*100).toFixed(1)+"%"} sub="a.a. nominal" good={projResult.expRet>projResult.benchRet} s/>
              <Card label="IPCA+4,09%" value={(projResult.benchRet*100).toFixed(1)+"%"} sub="índice de referência" s/>
              <Card label="vs Meta" value={(projResult.excessVsBench>=0?"+":"")+(projResult.excessVsBench*100).toFixed(2)+"%"} good={projResult.excessVsBench>0} s/>
              <Card label="Ret. Real Esp." value={(projResult.realRet*100).toFixed(1)+"%"} sub="acima do IPCA" good={projResult.realRet>0.04} s/>
              <Card label="Vol. Histórica" value={(projResult.annVol*100).toFixed(1)+"%"} sub="do período selecionado" s/>
              {scenario.stress&&<Card label="Estresse" value={(projResult.stressRet*100).toFixed(1)+"%"} sub="cenário adverso" good={false} s/>}
            </div>
            
            {/* Projection Chart */}
            <div style={{marginBottom:12}}>
              <div style={{fontSize:10,fontWeight:700,color:C.pri,marginBottom:6}}>Projeção de R$ 100 ({scenario.horizonte} anos)</div>
              <ResponsiveContainer width="100%" height={220}>
                <LineChart data={projResult.yearly} margin={{top:5,right:10,bottom:5,left:10}}>
                  <XAxis dataKey="year" fontSize={9} tickFormatter={v=>`Ano ${v}`}/>
                  <YAxis fontSize={8} tickFormatter={v=>`R$${v.toFixed(0)}`} domain={["auto","auto"]}/>
                  <Tooltip formatter={(v,name)=>[`R$ ${Number(v).toFixed(1)}`,name==="port"?"Carteira":name==="bench"?"IPCA+4,09%":name==="cdi"?"CDI":"Estresse"]} contentStyle={{fontSize:9,borderRadius:4}}/>
                  <Line type="monotone" dataKey="port" stroke={C.sec} strokeWidth={2.5} dot={{r:3}}/>
                  <Line type="monotone" dataKey="bench" stroke={C.red} strokeWidth={1.5} strokeDasharray="4 3" dot={{r:2}}/>
                  <Line type="monotone" dataKey="cdi" stroke={C.grayL} strokeWidth={1} strokeDasharray="2 2" dot={{r:2}}/>
                  {scenario.stress&&<Line type="monotone" dataKey="stress" stroke="#dc2626" strokeWidth={2} strokeDasharray="6 2" dot={{r:2}}/>}
                </LineChart>
              </ResponsiveContainer>
            </div>
            
            {/* Per-asset expected returns */}
            <div style={{marginBottom:12}}>
              <div style={{fontSize:10,fontWeight:700,color:C.pri,marginBottom:6}}>Retorno Esperado por Classe</div>
              {Object.entries(projResult.contrib).sort((a,b)=>b[1].contribution-a[1].contribution).map(([k,v])=>(
                <div key={k} style={{display:"flex",alignItems:"center",gap:6,padding:"3px 0",borderBottom:`1px solid ${C.light}`,fontSize:9}}>
                  <div style={{width:6,height:6,borderRadius:"50%",background:ASSETS[k]?.color||"#666",flexShrink:0}}/>
                  <span style={{width:100,fontWeight:500,color:C.pri}}>{ASSETS[k]?.name||k}</span>
                  <span style={{width:50,color:C.grayL}}>Peso: {(v.weight*100).toFixed(1)}%</span>
                  <span style={{width:60,fontWeight:600,color:v.expRet>=0?C.green:C.red}}>Ret: {(v.expRet*100).toFixed(1)}%</span>
                  <div style={{flex:1,height:8,background:C.light,borderRadius:4,overflow:"hidden"}}>
                    <div style={{width:`${Math.min(100,Math.abs(v.contribution)*100*10)}%`,height:"100%",background:ASSETS[k]?.color||"#666",borderRadius:4}}/>
                  </div>
                  <span style={{width:55,fontWeight:600,textAlign:"right",color:v.contribution>=0?C.green:C.red}}>{(v.contribution*100).toFixed(2)}%</span>
                </div>
              ))}
              <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",marginTop:4,fontWeight:700,fontSize:10,color:C.pri,borderTop:`2px solid ${C.border}`}}>
                <span>Total Esperado</span>
                <span style={{color:projResult.expRet>=0?C.green:C.red}}>{(projResult.expRet*100).toFixed(2)}% a.a.</span>
              </div>
            </div>
            
            {/* Model assumptions */}
            <div style={{padding:8,background:C.light,borderRadius:6,fontSize:8,color:C.grayL,lineHeight:1.6}}>
              <strong>Modelo de projeção:</strong> RF Pós≈Selic, IMA-B≈IPCA+juro real, RV≈Selic+prêmio de risco, Exterior≈retorno USD×câmbio.<br/>
              <strong>⚠️ Importante:</strong> Projeções são ESTIMATIVAS baseadas em premissas. Não são previsões. A volatilidade histórica não garante volatilidade futura. Use para análise estratégica, não como promessa de retorno.
            </div>
          </div>)}
        </div>)}

        {tab==="otimizar"&&(<div style={{background:C.white,borderRadius:10,padding:14,boxShadow:"0 1px 2px rgba(27,58,92,.08)",border:`1px solid ${C.border}`}}>
          <h3 style={{fontSize:13,fontWeight:700,margin:"0 0 4px",color:C.pri}}>🎯 Otimizador de Carteira</h3>
          <p style={{fontSize:9,color:C.grayL,margin:"0 0 12px"}}>Encontra a melhor carteira respeitando CMN 4.994/5.202 e limites da PI {plan!=="custom"?`do ${plan}`:""} 2026-2030.</p>
          <div style={{marginBottom:12,padding:10,background:C.light,borderRadius:8}}>
            <div style={{fontSize:10,fontWeight:700,color:C.pri,marginBottom:6}}>📋 Limites da PI {plan!=="custom"&&`(${plan})`} — RV máx 15% (CMN permite 70%)</div>
            {Object.entries(REG_LIMITS).map(([seg,info])=>(<div key={seg} style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,fontSize:10}}>
              <span style={{width:120,fontWeight:600,color:C.pri}}>{info.label}</span>
              <span style={{fontSize:9,color:C.grayL}}>Máx:</span>
              <input type="number" min={0} max={100} value={optSegMax[seg]?.max||info.max} onChange={e=>setOptSegMax(p=>({...p,[seg]:{max:Math.min(info.max,+e.target.value||0)}}))} style={{width:48,textAlign:"center",fontSize:10,border:`1px solid ${C.border}`,borderRadius:4,padding:2}}/>
              <span style={{fontSize:8,color:optSegMax[seg]?.max<info.max?C.gold:C.grayL}}>% (PI) · legal: {info.max}%</span>
            </div>))}
          </div>
          <div style={{marginBottom:12}}><div style={{fontSize:10,fontWeight:700,color:C.pri,marginBottom:6}}>📊 Min/Max por Classe (%)</div>
            <div style={{maxHeight:250,overflowY:"auto"}}>{AK.filter(k=>!["cdi","ipca"].includes(k)).map(k=>(<div key={k} style={{display:"flex",alignItems:"center",gap:4,padding:"2px 0",borderBottom:`1px solid ${C.light}`,fontSize:9}}>
              <div style={{width:6,height:6,borderRadius:"50%",background:ASSETS[k].color,flexShrink:0}}/><span style={{width:90,fontWeight:500,color:C.pri}}>{ASSETS[k].name}</span>
              <span style={{color:C.grayL}}>Min:</span><input type="number" min={0} max={100} step={1} value={optMins[k]||0} onChange={e=>setOptMins(p=>({...p,[k]:+e.target.value||0}))} style={{width:38,textAlign:"center",fontSize:9,border:`1px solid ${C.border}`,borderRadius:3,padding:1}}/>
              <span style={{color:C.grayL}}>Max:</span><input type="number" min={0} max={100} step={1} value={optMaxs[k]||""} onChange={e=>setOptMaxs(p=>({...p,[k]:+e.target.value||0}))} style={{width:38,textAlign:"center",fontSize:9,border:`1px solid ${C.border}`,borderRadius:3,padding:1}} placeholder={String(Object.values(REG_LIMITS).find(s=>s.keys.includes(k))?.max||50)}/>
              <span style={{fontSize:8,color:C.grayL}}>%</span></div>))}</div></div>
          <button onClick={doOpt} disabled={optRunning} style={{width:"100%",padding:"10px 0",borderRadius:8,border:"none",fontSize:12,fontWeight:700,cursor:"pointer",background:optRunning?C.grayL:`linear-gradient(135deg,${C.pri},${C.sec})`,color:C.white,marginBottom:14}}>
            {optRunning?"⏳ Calculando...":"🚀 Otimizar Carteira (40.000 simulações)"}</button>
          {optResult&&(<div><div style={{fontSize:11,fontWeight:700,color:C.pri,marginBottom:8}}>✅ {optResult.count.toLocaleString()} carteiras válidas</div>
            {[{label:"⭐ Máx. Sharpe",port:optResult.maxSharpe,desc:"Melhor retorno/risco"},{label:"🛡️ Mín. Volatilidade",port:optResult.minVol,desc:"Menor oscilação"},...optResult.targetPorts.map((p,i)=>({label:`🎯 Vol ~${(optResult.targets[i]*100).toFixed(0)}%`,port:p,desc:`Melhor Sharpe com ~${(optResult.targets[i]*100).toFixed(0)}% vol`}))].filter(x=>x.port).map((item,idx)=>(<div key={idx} style={{marginBottom:10,padding:10,background:C.light,borderRadius:8,border:`1px solid ${C.border}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <div><div style={{fontSize:11,fontWeight:700,color:C.pri}}>{item.label}</div><div style={{fontSize:8,color:C.grayL}}>{item.desc}</div></div>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>loadOptW(item.port.w)} style={{padding:"4px 10px",borderRadius:6,border:"none",background:C.sec,color:C.white,fontSize:9,fontWeight:600,cursor:"pointer"}}>Atual ▶</button>
                  <button onClick={()=>loadOptProposal(item.port.w)} style={{padding:"4px 10px",borderRadius:6,border:`1px solid ${C.acc}`,background:C.acc+"15",color:"#92400e",fontSize:9,fontWeight:700,cursor:"pointer"}}>Proposta ▶</button>
                </div></div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",fontSize:9,marginBottom:6}}>
                <span>Ret: <strong style={{color:C.green}}>{(item.port.ret*100).toFixed(1)}%</strong></span>
                <span>Vol: <strong>{(item.port.vol*100).toFixed(1)}%</strong></span>
                <span>Sharpe: <strong>{item.port.sharpe.toFixed(2)}</strong></span>
                <span>Pain: <strong>{(item.port.painIndex*100).toFixed(2)}%</strong></span>
                <span>Pain R.: <strong>{item.port.painRatio.toFixed(2)}</strong></span></div>
              <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>{Object.entries(item.port.w).filter(([k,v])=>v>.5).sort((a,b)=>b[1]-a[1]).map(([k,v])=>(<span key={k} style={{fontSize:7,padding:"1px 4px",borderRadius:4,background:(ASSETS[k]?.color||"#666")+"20",color:ASSETS[k]?.color||"#666",fontWeight:600}}>{ASSETS[k]?.name||k}: {v.toFixed(1)}%</span>))}</div>
            </div>))}
          </div>)}
          <div style={{marginTop:10,padding:8,background:"#FFF8E7",borderRadius:6,fontSize:8,color:"#713f12",lineHeight:1.5}}>
            <strong>📋 CMN 4.994/5.202:</strong> RF até 100% | RV até 70% | Estruturado até 20% (MM até 15%) | Exterior até 10%<br/>
            <strong>⚠️</strong> Otimização usa índices como proxy e busca discreta (Monte Carlo). Resultados são indicativos.</div>
        </div>)}

        {sA&&tab==="mensal"&&(<div style={{background:C.white,borderRadius:10,padding:12,boxShadow:"0 1px 2px rgba(27,58,92,.08)",border:`1px solid ${C.border}`}}>
          <h3 style={{fontSize:11,fontWeight:700,margin:"0 0 6px",color:C.pri}}>Retornos Mensais (%)</h3>
          <ResponsiveContainer width="100%" height={240}>
            <BarChart data={mBars} margin={{top:5,right:5,bottom:5,left:5}}>
              <XAxis dataKey="d" fontSize={6} tickLine={false} interval={Math.max(1,Math.floor(data.length/10))}/>
              <YAxis fontSize={7} tickLine={false} tickFormatter={v=>`${v}%`}/>
              <Tooltip formatter={(v,name)=>[`${Number(v).toFixed(2)}%`,name==="atual"?"🔵":"🟡"]} contentStyle={{fontSize:8,borderRadius:4}}/>
              <ReferenceLine y={0} stroke={C.border}/>
              <Bar dataKey="atual" radius={[2,2,0,0]}>{mBars.map((e,i)=><Cell key={i} fill={e.atual>=0?C.sec:C.sec+"60"}/>)}</Bar>
              {showB&&<Bar dataKey="proposta" radius={[2,2,0,0]}>{mBars.map((e,i)=><Cell key={i} fill={(e.proposta||0)>=0?C.acc:C.acc+"60"}/>)}</Bar>}
            </BarChart></ResponsiveContainer>
        </div>)}

        <div style={{marginTop:10,padding:8,background:"#EFF6FF",borderRadius:7,border:`1px solid ${C.sec}30`,fontSize:8,color:C.pri,lineHeight:1.55}}>
          <strong>ℹ️</strong> Sharpe = excesso mensal sobre CDI / volatilidade da carteira. Information Ratio e Tracking Error são calculados contra o CDI. O benchmark IPCA+4,09% é composto mês a mês.
        </div>
        

        <details style={{marginTop:10,background:C.white,borderRadius:8,border:`1px solid ${C.border}`,overflow:"hidden"}}>
          <summary style={{padding:"10px 14px",fontSize:11,fontWeight:700,color:C.pri,cursor:"pointer",background:C.light}}>📖 Glossário — O que significa cada indicador?</summary>
          <div style={{padding:"12px 14px",fontSize:10,lineHeight:1.8,color:C.pri}}>
            {Object.entries(GLOSSARY).map(([term,desc])=>(<div key={term} style={{marginBottom:4}}><strong style={{color:C.sec}}>{term}: </strong>{desc}</div>))}
            <div style={{marginTop:8,padding:8,background:C.light,borderRadius:6,fontSize:9,color:C.grayL}}>
              <strong>Nota:</strong> Meta de longo prazo = IPCA + 4,09% a.a. (índice de referência dos planos CD com meta atuarial). Métricas de eficiência (Sharpe, Sortino, Pain Ratio, IR) usam CDI como taxa livre de risco (convenção do mercado brasileiro). Plano VOCEPREV usa CDI como índice de referência.
            </div></div></details>

<div style={{marginTop:8,padding:8,background:"#FFF8E7",borderRadius:7,border:`1px solid ${C.acc}40`,fontSize:8,color:"#713f12",lineHeight:1.5}}>
          <strong>⚠️</strong> Índices são <strong>proxies</strong>. Fundos reais têm tracking difference, taxas e slippage. Atribuição considera pesos fixos e encadeamento geométrico. Rentabilidade passada ≠ futura.
        </div>
      </div>
    </div>
  </div>);
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
